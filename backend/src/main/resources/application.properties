spring.application.name=Machcare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

app.jwt.secret=${JWT_SECRET:MachCare-Change-This-Secret-Key-At-Least-32-Bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/machcare?currentSchema=dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dev}
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

server.port=${SERVER_PORT:8080}

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF