spring.application.name=Machcare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

app.jwt.secret=${JWT_SECRET:MachCare-Change-This-Secret-Key-At-Least-32-Bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/machcare?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:machcare}
spring.datasource.password=${DB_PASSWORD:machcare}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF