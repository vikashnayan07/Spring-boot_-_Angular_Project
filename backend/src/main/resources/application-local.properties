# Local-only development profile.
# Keeps the VM/office datasource in application.properties untouched.
spring.datasource.url=jdbc:postgresql://localhost:5432/machcare?currentSchema=dev
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=dev
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
server.port=${SERVER_PORT:8082}
