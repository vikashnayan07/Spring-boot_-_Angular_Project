<div class="filter-panel-grid">
  <!-- ===================================== -->
  <!-- SEVERITY DROPDOWN                     -->
  <!-- ===================================== -->
  <div class="filter-group">
    <label class="filter-label text-th-text2 font-heading">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="label-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
        />
      </svg>
      Severity
    </label>
    <div class="select-wrapper">
      <select
        [(ngModel)]="selectedSeverity"
        class="filter-select bg-th-bg3 border-th-border text-th-text"
      >
        <option value="">All Severities</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        <option value="Critical">Critical</option>
      </select>
      <div class="select-chevron text-th-muted">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>

  <!-- ===================================== -->
  <!-- MACHINE DROPDOWN                      -->
  <!-- ===================================== -->
  <div class="filter-group">
    <label class="filter-label text-th-text2 font-heading">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="label-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>
      Machine
    </label>
    <div class="select-wrapper">
      <select
        [(ngModel)]="selectedMachine"
        class="filter-select bg-th-bg3 border-th-border text-th-text"
      >
        <option value="">All Machines</option>
        <option *ngFor="let machine of machines" [value]="machine.machineId">
          {{ machine.machineName || machine.machineId }}
        </option>
      </select>
      <div class="select-chevron text-th-muted">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>

  <!-- ===================================== -->
  <!-- DATE RANGE                            -->
  <!-- ===================================== -->
  <div class="filter-group">
    <label class="filter-label text-th-text2 font-heading">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="label-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8 7V3m8 4V3m-9 8h10m-11 8h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>
      Date Range
    </label>
    <div class="date-range">
      <input
        type="date"
        [(ngModel)]="startDate"
        (change)="onStartDateChange()"
        class="filter-input bg-th-bg3 border-th-border text-th-text"
        placeholder="Start date"
      />
      <input
        type="date"
        [(ngModel)]="endDate"
        [min]="startDate"
        (change)="onEndDateChange()"
        class="filter-input bg-th-bg3 border-th-border text-th-text"
        placeholder="End date"
      />
    </div>
    <p *ngIf="dateError" class="date-error text-sm">{{ dateError }}</p>
  </div>

  <!-- ===================================== -->
  <!-- BUTTONS                               -->
  <!-- ===================================== -->
  <div class="filter-buttons">
    <button class="btn-apply" (click)="applyFilters()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
        />
      </svg>
      Apply Filters
    </button>
    <button class="btn-clear text-th-text2" (click)="clearFilters()">
      Reset Filters
    </button>
  </div>
</div>
