<!-- Loading State -->
<div *ngIf="isLoading" class="charts-grid">
  <div class="glass-card p-8 animate-pulse">
    <div class="h-6 w-48 bg-th-bg3 rounded-lg mb-4"></div>
    <div class="h-4 w-32 bg-th-bg3 rounded-lg mb-8"></div>
    <div class="h-[350px] bg-th-bg3 rounded-2xl"></div>
  </div>
  <div class="glass-card p-8 animate-pulse">
    <div class="h-6 w-48 bg-th-bg3 rounded-lg mb-4"></div>
    <div class="h-4 w-32 bg-th-bg3 rounded-lg mb-8"></div>
    <div class="h-[350px] bg-th-bg3 rounded-2xl"></div>
  </div>
</div>

<!-- Charts Grid -->
<div *ngIf="!isLoading" class="charts-grid">
  <!-- ===================================== -->
  <!-- LINE CHART CARD -->
  <!-- ===================================== -->
  <div class="glass-card chart-card relative overflow-hidden p-8">
    <!-- Glow accent -->
    <div class="glow-accent glow-cyan"></div>

    <!-- Header -->
    <div class="relative z-10 flex items-start justify-between mb-8">
      <div>
        <!-- Badge -->
        <div class="chart-badge badge-green">
          <div class="pulse-dot pulse-green"></div>
          <span class="text-xs font-medium">Live Analytics</span>
        </div>
        <h2 class="text-2xl font-heading font-bold text-th-text tracking-tight">
          Fault Trend Analytics
        </h2>
        <p class="text-th-muted mt-2 text-sm leading-relaxed">
          Monitor machine breakdown patterns and operational downtime trends.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <div class="period-toggle">
          <button
            *ngFor="let period of periodOptions"
            (click)="setPeriod(period)"
            class="period-btn"
            [class.active]="selectedPeriod === period"
          >
            {{ period }}D
          </button>
        </div>
        <div class="chart-icon icon-cyan">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"
            />
          </svg>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="relative z-10 chart-container">
      <canvas #lineChart></canvas>
    </div>
  </div>

  <!-- ===================================== -->
  <!-- DOUGHNUT CHART CARD -->
  <!-- ===================================== -->
  <div class="glass-card chart-card relative overflow-hidden p-8">
    <!-- Glow accent -->
    <div class="glow-accent glow-violet"></div>

    <!-- Header -->
    <div class="relative z-10 flex items-start justify-between mb-8">
      <div>
        <!-- Badge -->
        <div class="chart-badge badge-violet">
          <div class="pulse-dot pulse-violet"></div>
          <span class="text-xs font-medium">Severity Insights</span>
        </div>
        <h2 class="text-2xl font-heading font-bold text-th-text tracking-tight">
          Severity Distribution
        </h2>
        <p class="text-th-muted mt-2 text-sm leading-relaxed">
          Analyze criticality levels of machine failures and prioritize
          maintenance.
        </p>
      </div>
      <!-- Icon -->
      <div class="chart-icon icon-violet">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>
    </div>

    <!-- Chart -->
    <div class="relative z-10 chart-container flex items-center justify-center">
      <canvas #doughnutChart></canvas>
    </div>
  </div>
</div>
