<section class="min-h-screen bg-th-bg px-4 py-10 text-th-text">
  <div class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-6xl items-center justify-center">
    <div class="enterprise-panel w-full max-w-2xl animate-fade-in-up">
      <p class="enterprise-page-eyebrow">Account recovery</p>
      <h1 class="enterprise-page-title gradient-text">Reset Password</h1>
      <p class="enterprise-page-copy mb-8">
        Verify your identity and create a secure password for MachCare access.
      </p>

      <div *ngIf="errorMsg" class="mb-5 rounded-2xl border border-red-400/30 bg-red-400/10 p-4 text-sm font-bold text-red-300">
        {{ errorMsg }}
      </div>
      <div *ngIf="successMsg" class="mb-5 rounded-2xl border border-emerald-400/30 bg-emerald-400/10 p-4 text-sm font-bold text-emerald-300">
        {{ successMsg }} Redirecting...
      </div>

      <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="onEmailSubmit()" class="raise-form">
        <label class="raise-form-full">
          <span>Registered Email Address</span>
          <input formControlName="email" type="email" class="input !min-h-[44px] !pl-4" placeholder="employee@tcs.com" />
        </label>
        <div class="engineer-modal-actions raise-form-full">
          <a routerLink="/login" class="enterprise-btn-secondary">Back to Login</a>
          <button type="submit" class="enterprise-btn" [disabled]="emailForm.invalid || isLoading">
            <span *ngIf="isLoading" class="mini-spinner"></span>
            {{ isLoading ? "Finding Account..." : "Find My Account" }}
          </button>
        </div>
      </form>

      <form *ngIf="step === 2" [formGroup]="resetForm" (ngSubmit)="onResetSubmit()" class="raise-form">
        <label>
          <span>Question 1</span>
          <strong class="text-sm text-th-text">{{ questions.q1 }}</strong>
          <input formControlName="a1" type="text" class="input !min-h-[44px] !pl-4" placeholder="Your answer" />
        </label>
        <label>
          <span>Question 2</span>
          <strong class="text-sm text-th-text">{{ questions.q2 }}</strong>
          <input formControlName="a2" type="text" class="input !min-h-[44px] !pl-4" placeholder="Your answer" />
        </label>

        <label>
          <span>New Password</span>
          <input formControlName="newPassword" type="password" class="input !min-h-[44px] !pl-4" placeholder="Minimum 8 characters" />
        </label>
        <label>
          <span>Confirm Password</span>
          <input formControlName="confirmPassword" type="password" class="input !min-h-[44px] !pl-4" placeholder="Re-enter password" />
          <small *ngIf="resetForm.errors?.['passwordMismatch'] && resetForm.get('confirmPassword')?.touched" class="text-red-300">
            Passwords must match.
          </small>
        </label>

        <div class="raise-form-full password-check-grid">
          <span *ngFor="let check of passwordChecks" [class.valid]="check.valid">
            {{ check.valid ? "OK" : "--" }} {{ check.label }}
          </span>
        </div>

        <div class="engineer-modal-actions raise-form-full">
          <a routerLink="/login" class="enterprise-btn-secondary">Back to Login</a>
          <button type="submit" class="enterprise-btn" [disabled]="resetForm.invalid || isLoading">
            <span *ngIf="isLoading" class="mini-spinner"></span>
            {{ isLoading ? "Resetting..." : "Secure Account and Reset" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
